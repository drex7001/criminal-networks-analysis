name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  UV_VERSION: "0.11.19"

jobs:
  fast-tests:
    name: Fast tests and contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv lock --check
      - run: uv sync --locked --extra dev
      - run: make test-fast

  integration-tests:
    name: PostgreSQL integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis-test
          POSTGRES_DB: aegis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aegis -d aegis_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      AEGIS_TEST_DATABASE_URL: postgresql+psycopg://aegis:aegis-test@localhost:5432/aegis_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --locked --extra dev
      - run: make test-integration

  system-tests:
    name: OpenFGA system tests
    runs-on: ubuntu-latest
    env:
      AEGIS_TEST_DATABASE_URL: postgresql+psycopg://aegis:aegis-dev@localhost:5433/aegis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --locked --extra dev
      - run: make up
      - run: make bootstrap
      - run: make test-system
      - if: always()
        run: make down

  coverage-and-governance:
    name: Coverage and governance gates
    runs-on: ubuntu-latest
    env:
      AEGIS_TEST_DATABASE_URL: postgresql+psycopg://aegis:aegis-dev@localhost:5433/aegis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --locked --extra dev
      - run: make up
      - run: make bootstrap
      - run: make test-coverage
      - name: Validate ontology artifact (Article XI)
        run: uv run aegis ontology validate
      - if: always()
        run: make down

  # Node-only and hermetic: the smoke journey stubs Keycloak and the API at the
  # network boundary (ui/e2e/oidc-stub.ts), so a UI change gets its answer in
  # seconds. The full loop against a live stack is T25/T27's blocking demo.
  workspace:
    name: Workspace type-check, build and smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Fail if the generated API client is stale
        # The committed client must match the committed OpenAPI document. The
        # document itself is checked against the live routes by
        # tests/contract/test_openapi.py in the fast-tests job.
        run: |
          npm run generate:api
          git diff --exit-code src/api/schema.d.ts
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: ui/test-results/
          retention-days: 7

  test:
    name: test
    if: always()
    needs:
      - fast-tests
      - integration-tests
      - system-tests
      - coverage-and-governance
      - workspace
    runs-on: ubuntu-latest
    steps:
      - name: Enforce all blocking test stages
        run: |
          test "${{ needs.fast-tests.result }}" = "success"
          test "${{ needs.integration-tests.result }}" = "success"
          test "${{ needs.system-tests.result }}" = "success"
          test "${{ needs.coverage-and-governance.result }}" = "success"
          test "${{ needs.workspace.result }}" = "success"
