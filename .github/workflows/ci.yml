name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis-test
          POSTGRES_DB: aegis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aegis -d aegis_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install aegis package
        run: pip install -e ".[dev]"
      - name: Unit tests
        env:
          AEGIS_TEST_DATABASE_URL: postgresql+psycopg://aegis:aegis-test@localhost:5432/aegis_test
        run: python -m pytest -q
      - name: Validate ontology artifact (Article XI gate)
        run: aegis ontology validate
