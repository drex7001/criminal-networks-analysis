name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  UV_VERSION: "0.11.19"

jobs:
  fast-tests:
    name: Fast tests and contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv lock --check
      - run: uv sync --locked --extra dev
      - run: make test-fast

  integration-tests:
    name: PostgreSQL integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis-test
          POSTGRES_DB: aegis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aegis -d aegis_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      AEGIS_TEST_DATABASE_URL: postgresql+psycopg://aegis:aegis-test@localhost:5432/aegis_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --locked --extra dev
      - run: make test-integration

  system-tests:
    name: OpenFGA system tests
    runs-on: ubuntu-latest
    env:
      AEGIS_TEST_DATABASE_URL: postgresql+psycopg://aegis:aegis-dev@localhost:5433/aegis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --locked --extra dev
      - run: make up
      - run: make bootstrap
      - run: make test-system
      - if: always()
        run: make down

  coverage-and-governance:
    name: Coverage and governance gates
    runs-on: ubuntu-latest
    env:
      AEGIS_TEST_DATABASE_URL: postgresql+psycopg://aegis:aegis-dev@localhost:5433/aegis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --locked --extra dev
      - run: make up
      - run: make bootstrap
      - run: make test-coverage
      - name: Validate ontology artifact (Article XI)
        run: uv run aegis ontology validate
      - if: always()
        run: make down
